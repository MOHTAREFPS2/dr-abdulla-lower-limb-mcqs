<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Quizzes Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        #app {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        #selection-screen {
            text-align: center;
            padding: 20px;
        }
        #selection-screen h2 {
            color: #34495e;
            margin-bottom: 30px;
        }

        /* تنسيق شبكي (Grid) لأزرار المحاضرات لتبدو مرتبة */
        #lecture-buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .lecture-btn {
            background-color: #2ecc71;
            color: white;
            padding: 18px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        .lecture-btn:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(46, 204, 113, 0.3);
        }

        .nav-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .nav-btn {
            width: 42px;
            height: 42px;
            border: 1px solid #cbd5e0;
            background: #fff;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            transition: 0.2s;
        }
        .nav-btn:hover { background: #e2e8f0; }
        .nav-btn.current { border: 2px solid #3498db; background: #ebf5fb; transform: scale(1.1); box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3); }
        .nav-btn.correct { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .nav-btn.wrong { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .nav-btn.marked { border-bottom: 5px solid #f1c40f; }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
            text-align: left;
            color: #2c3e50;
        }
        .option {
            display: block;
            padding: 15px 18px;
            margin-bottom: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
            font-size: 1.1em;
            transition: all 0.2s;
            text-align: left;
            color: #334155;
        }
        .option:hover:not(.disabled) {
            background: #edf2f7;
            border-color: #cbd5e0;
            transform: translateX(5px);
        }
        .option.correct-ans { background: #d4edda; border-color: #28a745; cursor: default; color: #155724; font-weight: bold; }
        .option.wrong-ans { background: #f8d7da; border-color: #dc3545; cursor: default; color: #721c24; font-weight: bold;}
        .option.disabled { cursor: not-allowed; opacity: 0.9; }

        .explanation {
            margin-top: 25px;
            padding: 18px 20px;
            background: #f0f9ff;
            border-left: 5px solid #0ea5e9;
            border-radius: 6px;
            font-size: 1.1em;
            display: none;
            animation: fadeIn 0.4s ease-in-out;
            text-align: left;
            color: #0c4a6e;
        }
        .explanation.show { display: block; }

        /* تنسيق أزرار التحكم في الأسفل */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
            border-top: 2px solid #e2e8f0;
            padding-top: 25px;
            gap: 15px;
        }
        .controls-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: bold;
            color: #fff;
            transition: 0.2s;
        }
        .btn:disabled { background: #cbd5e0; cursor: not-allowed; color: #94a3b8; }
        .btn-primary { background: #3b82f6; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover:not(:disabled) { background: #d97706; }
        .btn-success { background: #10b981; }
        .btn-success:hover:not(:disabled) { background: #059669; }
        .btn-info { background: #8b5cf6; }
        .btn-info:hover:not(:disabled) { background: #7c3aed; }

        #result-screen { text-align: center; display: none; padding: 20px; }
        .score { font-size: 3em; margin-bottom: 20px; color: #1e293b; font-weight: bold; }
        .result-details { font-size: 1.3em; margin-bottom: 30px; background: #f8fafc; padding: 20px; border-radius: 10px; display: inline-block; text-align: left; border: 1px solid #e2e8f0;}
        .result-details p { margin: 10px 0; }
        
        #loading { text-align: center; font-size: 1.5em; color: #3b82f6; margin-top: 50px; display: none; font-weight: bold; }
        #error-msg { text-align: center; color: #ef4444; font-weight: bold; margin-top: 20px; display: none; font-size: 1.1em; background: #fef2f2; padding: 15px; border-radius: 8px;}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* توافق مع شاشات الهواتف */
        @media (max-width: 600px) {
            .controls { flex-direction: column; align-items: stretch; }
            .controls-group { justify-content: space-between; }
            .btn { width: 100%; margin-bottom: 10px; text-align: center; }
            .controls-group .btn { width: 48%; margin-bottom: 0; }
            .nav-btn { width: 35px; height: 35px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1 id="main-title">Medical Quizzes Platform<br>Dr.abdulla MCQs</h1>

    <div id="selection-screen">
        <h2>Select a Lecture to Start:</h2>
        <div id="lecture-buttons-container"></div>
        <div id="error-msg"></div>
    </div>

    <div id="loading">Loading questions... Please wait</div>

    <div id="quiz-screen" style="display: none;">
        <div id="nav-container" class="nav-container"></div>
        <div id="question-area"></div>
        
        <div class="controls">
            <div class="controls-group">
                <button id="btn-prev" class="btn btn-primary" onclick="prevQuestion()">&#8592; Previous</button>
                <button id="btn-mark" class="btn btn-warning" onclick="markCurrent()">Mark for review</button>
                <button id="btn-next" class="btn btn-primary" onclick="nextQuestion()">Next &#8594;</button>
            </div>
            <button class="btn btn-success" onclick="showResults()">Submit Quiz</button>
        </div>
        
        <div style="text-align: center; margin-top: 25px;">
            <button class="btn btn-info" onclick="returnToSelection()">Return to Lectures Menu</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>Quiz Completed!</h2>
        <div class="score" id="score-display"></div>
        <div class="result-details" id="result-details"></div>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px;">
            <button class="btn btn-info" onclick="startReExam()">Re-Exam Incorrect & Marked</button>
            <button class="btn btn-warning" onclick="returnToSelection()">Return to Lectures Menu</button>
        </div>
    </div>
</div>

<script>
// Available Lectures Array mapped correctly to JSON files
const availableLectures = [
    { title: "Pelvic girdle +femur + nerves + gluteal region", filename: "p.json" },
    { title: "Thigh + popliteal fossa", filename: "t+p.json"},
    { title: "Leg + tibia + fibula + foots bone", filename: "L+B.json"},
    { title: "Foot + joint", filename: "F+J.json"}
];

let questions = [];
let TOTAL_QS = 0;
let userAnswers = [];
let isMarked = [];
let activeIndices = [];
let currentPtr = 0;

// Populate the buttons when the page loads
window.onload = function() {
    const container = document.getElementById('lecture-buttons-container');
    availableLectures.forEach(lecture => {
        let btn = document.createElement('button');
        btn.className = 'lecture-btn';
        btn.innerText = lecture.title;
        btn.onclick = () => loadLecture(lecture.filename, lecture.title);
        container.appendChild(btn);
    });
};

function loadLecture(selectedFile, selectedTitle) {
    document.getElementById('selection-screen').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('main-title').innerText = selectedTitle;

    fetch(selectedFile)
        .then(response => {
            if (!response.ok) {
                throw new Error('File not found or connection issue.');
            }
            return response.json();
        })
        .then(data => {
            questions = data;
            TOTAL_QS = questions.length;
            
            if(TOTAL_QS === 0) throw new Error('The file contains no questions.');

            // Reset variables
            userAnswers = new Array(TOTAL_QS).fill(null);
            isMarked = new Array(TOTAL_QS).fill(false);
            activeIndices = Array.from({length: TOTAL_QS}, (_, i) => i);
            currentPtr = 0;
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            
            renderNav();
            renderQuestion();
        })
        .catch(error => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'block';
            const errorDiv = document.getElementById('error-msg');
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `Failed to load <strong>${selectedFile}</strong>.<br><br>Make sure the file exists and you are running this app on a Local Server (e.g. Live Server).`;
            console.error(error);
        });
}

function returnToSelection() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('selection-screen').style.display = 'block';
    document.getElementById('main-title').innerText = "Medical Quizzes Platform";
}

function renderNav() {
    const navContainer = document.getElementById('nav-container');
    navContainer.innerHTML = '';
    
    activeIndices.forEach((realIdx, ptr) => {
        let btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.innerText = realIdx + 1;
        
        if (ptr === currentPtr) btn.classList.add('current');
        
        if (userAnswers[realIdx] !== null) {
            if (userAnswers[realIdx] === questions[realIdx].a) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
            }
        }
        
        if (isMarked[realIdx]) {
            btn.classList.add('marked');
        }
        
        btn.onclick = () => {
            currentPtr = ptr;
            renderNav();
            renderQuestion();
        };
        navContainer.appendChild(btn);
    });
}

function renderQuestion() {
    if(questions.length === 0) return;
    const qContainer = document.getElementById('question-area');
    const realIdx = activeIndices[currentPtr];
    const qData = questions[realIdx];
    const answered = userAnswers[realIdx] !== null;
    
    let html = `<div class="question-text">Question ${realIdx + 1}: ${qData.q}</div>`;
    
    qData.o.forEach((opt, oIdx) => {
        let classes = ['option'];
        if (answered) {
            classes.push('disabled');
            if (oIdx === qData.a) {
                classes.push('correct-ans');
            } else if (oIdx === userAnswers[realIdx]) {
                classes.push('wrong-ans');
            }
        }
        
        html += `<div class="${classes.join(' ')}" onclick="selectOption(${oIdx})">${String.fromCharCode(65 + oIdx)}. ${opt}</div>`;
    });
    
    let explClasses = answered ? 'explanation show' : 'explanation';
    html += `<div class="${explClasses}"><strong>Explanation:</strong> ${qData.e || 'No explanation available.'}</div>`;
    
    qContainer.innerHTML = html;
    
    const markBtn = document.getElementById('btn-mark');
    markBtn.innerText = isMarked[realIdx] ? 'Unmark Question' : 'Mark for review';
    
    document.getElementById('btn-prev').disabled = (currentPtr === 0);
    document.getElementById('btn-next').disabled = (currentPtr === activeIndices.length - 1);
}

window.selectOption = function(oIdx) {
    const realIdx = activeIndices[currentPtr];
    if (userAnswers[realIdx] !== null) return; 
    
    userAnswers[realIdx] = oIdx;
    renderNav();
    renderQuestion();
};

window.markCurrent = function() {
    const realIdx = activeIndices[currentPtr];
    isMarked[realIdx] = !isMarked[realIdx];
    renderNav();
    renderQuestion();
};

window.prevQuestion = function() {
    if (currentPtr > 0) {
        currentPtr--;
        renderNav();
        renderQuestion();
    }
};

window.nextQuestion = function() {
    if (currentPtr < activeIndices.length - 1) {
        currentPtr++;
        renderNav();
        renderQuestion();
    }
};

window.showResults = function() {
    let missed = activeIndices.filter(idx => userAnswers[idx] === null);
    if (missed.length > 0) {
        if (!confirm(`You have ${missed.length} unanswered questions. Are you sure you want to submit?`)) {
            return;
        }
    }

    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    let correctCount = 0;
    let wrongCount = 0;
    let unansCount = 0;

    for(let i = 0; i < TOTAL_QS; i++) {
        if (userAnswers[i] === questions[i].a) correctCount++;
        else if (userAnswers[i] === null) unansCount++;
        else wrongCount++;
    }
    
    const percentage = ((correctCount / TOTAL_QS) * 100).toFixed(1);
    document.getElementById('score-display').innerText = `${correctCount} / ${TOTAL_QS} (${percentage}%)`;
    document.getElementById('result-details').innerHTML = `
        <p>✅ Correct: <strong>${correctCount}</strong></p>
        <p>❌ Incorrect: <strong>${wrongCount}</strong></p>
        <p>⚪ Unanswered: <strong>${unansCount}</strong></p>
    `;
};

window.startReExam = function() {
    let newIndices = [];
    for(let i = 0; i < TOTAL_QS; i++) {
        if (userAnswers[i] !== questions[i].a || isMarked[i]) {
            newIndices.push(i);
            userAnswers[i] = null; 
            isMarked[i] = false;   
        }
    }
    
    if (newIndices.length === 0) {
        alert("Perfect! You have no incorrect or marked questions to re-exam.");
        return;
    }
    
    activeIndices = newIndices;
    currentPtr = 0;
    
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    
    renderNav();
    renderQuestion();
};
</script>
</body>
</html>
